<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1611" />
    <meta name="description" content="Atelier d'Or — gestion de bijouterie et d'or : ventes, achats, stock, clients et cours en direct." />

    <title>Atelier d'Or — Gestion bijouterie</title>

    <!-- Icônes + installation (PWA) -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atelier d'Or" />

    <!-- Écran de chargement : logo "Au" pendant le rechargement / rafraîchissement -->
    <style>
      html, body { margin: 0; background: #1c1611; }
      #boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        background: #1c1611; transition: opacity .35s ease;
      }
      #boot .au {
        width: 92px; height: 92px; border-radius: 22px;
        background: #b8862f; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-size: 38px;
        box-shadow: 0 14px 40px rgba(0,0,0,.45);
        animation: bootpulse 1.2s ease-in-out infinite;
      }
      #boot .au-name {
        color: #caa45e;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 600; font-size: 15px; letter-spacing: .4px;
      }
      @keyframes bootpulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(.9); opacity: .7; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="au">Au</div>
        <div class="au-name">Atelier d'Or</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
